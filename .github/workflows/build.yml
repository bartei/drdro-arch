name: build-arch

on:
  workflow_dispatch:        # run on demand (build a new image when we want one)
  push:
    branches: [main]
    paths: ['build.sh', 'packages.txt', 'overlay/**', 'boot/**', '.github/workflows/build.yml']

concurrency:
  group: arch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: arch linux arm rpi (aarch64, native)
    runs-on: ubuntu-24.04-arm   # native ARM64 → the ALARM chroot runs without qemu
    timeout-minutes: 90
    env:
      WORK: /mnt/arch/work      # build on the big ephemeral /mnt volume, not the small root disk
      OUT: /mnt/arch/out
    steps:
      - uses: actions/checkout@v4

      - name: Free disk + prep /mnt scratch
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/share/dotnet || true
          sudo mkdir -p /mnt/arch && sudo chown -R "$USER" /mnt/arch
          df -h / /mnt

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools dosfstools mtools e2fsprogs util-linux git curl zstd

      - name: Build image
        run: sudo WORK="$WORK" OUT="$OUT" ./build.sh

      - name: Compress
        # build.sh runs under sudo, so $OUT is root-owned; compress as root too (the .zst lands
        # world-readable, so the upload step can still read it).
        run: sudo zstd -19 -T0 "$OUT/drdro-arch-rpi-aarch64.img" -o "$OUT/drdro-arch-rpi-aarch64.img.zst"

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: drdro-arch-rpi-aarch64
          path: /mnt/arch/out/drdro-arch-rpi-aarch64.img.zst
          if-no-files-found: error
          compression-level: 0
