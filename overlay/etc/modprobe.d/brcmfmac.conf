# Disable the in-firmware WPA supplicant (FWSUP, bit 13) + SAE offload (bit 19): the Cypress
# 7.45.98 firmware on the Pi 3B's BCM43430 botches the offloaded 4-way handshake, and
# wpa_supplicant >= 2.11 engages that offload by default (2.10, as shipped by Debian trixie /
# RPi OS, never does — which is why the ospi image "just worked"). With offload on, EAPOL never
# reaches the supplicant -> "Authentication timed out" + NM's misleading "Secrets were required".
# Software handshake works fine. Live-validated on the bench Pi 3B on a multi-AP 2.4 GHz network.
# See https://bugzilla.redhat.com/show_bug.cgi?id=2302577
options brcmfmac feature_disable=0x82000
