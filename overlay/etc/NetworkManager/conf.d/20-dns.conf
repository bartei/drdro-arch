# NM must own /etc/resolv.conf as a plain file. Arch systemd's tmpfiles factory recreates
# /etc/resolv.conf on boot as a symlink to systemd-resolved's stub; resolved is disabled on this
# image, and NM's rc-manager=auto sees that symlink and defers DNS to the absent daemon
# (dns=systemd-resolved) -> address via DHCP but zero name resolution on every fresh boot.
[main]
dns=default
rc-manager=file
